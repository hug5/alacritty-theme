# Colors
colors:
  # Default colors
  primary:
    # hard contrast: background = '#1d2021'
    background: '#2E2912'
    # soft contrast: background = '#32302f'
    foreground: '#E17C33'

  cursor:
    #text: CellBackground
      # Refers to the text under the cursor
    #cursor: CellForeground
      # This is the cursor color block
    cursor: '#CFCFCF'

  normal:
    black:   '#101010'  # tmux footer text
    red:     '#cc241d'
    yellow:  '#d79921'
    green:   '#6D503B'  # tmux footer background
    blue:    '#609F9F'
    magenta: '#b16286'
    cyan:    '#689d6a'
    white:   '#A89984'

  bright:
    black:   '#928374'
    red:     '#fb4934'
    yellow:  '#fabd2f'
    green:   '#B2B28C'
      # "h5@hubm" characters; tmux footer window selection background
      # Tmux footer selected highlight
    blue:    '#67A9A3'  # ~/.../alacritty/themes;  Directory path
    magenta: '#d3869b'
    cyan:    '#8ec07c'
    white:   '#EBDBB2'



  # Dim colors
  #
  # If the dim colors are not set, they will be calculated automatically based
  # on the `normal` colors.
  #dim:
  #  black:   '#DED237'
  #  red:     '#864343'
  #  green:   '#777c44'
  #  yellow:  '#9e824c'
  #  blue:    '#556a7d'
  #  magenta: '#75617b'
  #  cyan:    '#5b7d78'
  #  white:   '#828482'

  # Indexed Colors
  #
  # The indexed colors include all colors from 16 to 256.
  # When these are not set, they're filled with sensible defaults.
  #
  # Example:
  #   `- { index: 16, color: '#ff00ff' }`
  #
  #indexed_colors: []
